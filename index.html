<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit_tracker</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <form action="structure.html">
        <u>
            <h1 id="h1">To-Do-List</h1>
        </u>
        <u>
            <h3 id="main-tasks">Main tasks</h3>
        </u>
        <div id="tasks">
            <ol id="task-list">
                <li>workout <input class="box" id="box1" type="checkbox"></li><br>
                <li>book reading (10 pages) <input class="box" id="box2" type="checkbox"></li><br>
                <li>study for 3hrs <input class="box" id="box3" type="checkbox"></li><br>
            </ol>
        </div>

        <button type="submit" id="submit-btn">Submit</button>
        <button type="button" id="adding-btn">Add new task</button><br>
        <button type="button" id="delete-btn">Delete task</button>
        <button type="button" id="edit-btn">Edit task</button>
    </form>
    <script src="interact.js"></script>
</body>

</html>
